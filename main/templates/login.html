{% extends "base.html" %}

{% block content %}

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3>Вход</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            Неправильное имя пользователя или пароль
                        </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="{{form.username.name}}" id="" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="{{form.password.name}}" id="" class="form-control" required>
                    </div>
                    <button type="submit" class = "btn btn-primary">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
