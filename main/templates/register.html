{% extends "base.html" %}

{% block content %}

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h3>Регистрация</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger">
                           <ul>
                               {% for i in form %}
                                   {% for j in i.errors %}
                                    <li>
                                        {{j}}
                                    </li>
                                   {% endfor %}
                               {% endfor %}
                           </ul>
                        </div>
                    {% endif %}
                    <div class="mb-3">
                        <label class="form-label" for="{{form.username.id_for_label}}">Логин</label>
                        <input type="text" name="{{form.username.name}}" id="{{form.username.id_for_label}}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for={{form.password1.id_for_label}}>Пароль</label>
                        <input type="password" name="{{form.password1.name}}" id="{{form.password1.id_for_label}}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{form.password2.id_for_label}}">Подтвердите пароль</label>
                        <input type="password" name="{{form.password2.name}}" id="{{form.password2.id_for_label}}" class="form-control" required>
                    </div>
                    <button type="submit" class = "btn btn-primary">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
