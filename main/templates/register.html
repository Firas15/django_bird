{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<main>
    <div class="auth-page">
        <div class="auth-card">

            <div class="auth-card__header">
                <span class="auth-card__icon"><i class="fa-solid fa-user-plus"></i></span>
                <h2>Регистрация</h2>
            </div>

            <div class="auth-card__body">
                {% if form.errors %}
                <div class="auth-card__error">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <ul>
                        {% for field in form %}
                            {% for error in field.errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="auth-card__field">
                        <label for="{{ form.username.id_for_label }}">Логин</label>
                        <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" class="auth-card__input" placeholder="Придумайте логин" required>
                    </div>
                    <div class="auth-card__field">
                        <label for="{{ form.password1.id_for_label }}">Пароль</label>
                        <input type="password" name="{{ form.password1.name }}" id="{{ form.password1.id_for_label }}" class="auth-card__input" placeholder="Придумайте пароль" required>
                    </div>
                    <div class="auth-card__field">
                        <label for="{{ form.password2.id_for_label }}">Подтвердите пароль</label>
                        <input type="password" name="{{ form.password2.name }}" id="{{ form.password2.id_for_label }}" class="auth-card__input" placeholder="Повторите пароль" required>
                    </div>
                    <button type="submit" class="auth-card__submit">
                        <i class="fa-solid fa-user-plus"></i> Зарегистрироваться
                    </button>
                </form>

                <div class="auth-card__switch">
                    Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
                </div>
            </div>

        </div>
    </div>
</main>
{% endblock %}
